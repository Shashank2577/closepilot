# Production compose — uses external Neon DB and Redis Cloud.
# Run on your Oracle VPS: docker-compose -f docker-compose.prod.yml up -d
#
# Required .env variables:
#   DATABASE_URL  — Neon connection string (pooled URL)
#   REDIS_URL     — Redis Cloud connection string (redis://... or rediss://...)
#   ANTHROPIC_API_KEY
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
#   JWT_SECRET

services:

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: closepilot-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      NODE_ENV: production
      API_PORT: 3001

  worker:
    build:
      context: .
      dockerfile: packages/agents/orchestrator/Dockerfile
    container_name: closepilot-worker
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      - api

  mcp:
    build:
      context: .
      dockerfile: packages/mcp-server/Dockerfile
    container_name: closepilot-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NODE_ENV: production
