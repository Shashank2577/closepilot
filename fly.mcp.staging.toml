app = "closepilot-mcp-staging"
primary_region = "ord"

[build]
dockerfile = "packages/mcp-server/Dockerfile"

[[services]]
internal_port = 3000
protocol = "tcp"

  [[services.http_checks]]
  interval = "10s"
  timeout = "2s"
  grace_period = "10s"
  path = "/health"
  method = "get"

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
