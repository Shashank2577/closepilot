services:

  # ── PostgreSQL (pgvector) ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: closepilot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: closepilot
      POSTGRES_PASSWORD: closepilot_dev
      POSTGRES_DB: closepilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U closepilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── BullMQ Agent Worker ────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: packages/agents/orchestrator/Dockerfile
    container_name: closepilot-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://closepilot:closepilot_dev@postgres:5432/closepilot
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── REST API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: closepilot-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://closepilot:closepilot_dev@postgres:5432/closepilot
      REDIS_URL: redis://redis:6379
      API_PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  # ── Next.js web UI ─────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: closepilot-web
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3002
    depends_on:
      - api

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: closepilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
