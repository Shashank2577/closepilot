app = "closepilot-web"
primary_region = "ord"

[build]
dockerfile = "packages/web/Dockerfile"
  [build.args]
  NEXT_PUBLIC_API_URL = "https://closepilot-api.fly.dev"

[http_service]
internal_port = 3002
force_https = true
auto_start_machines = true
auto_stop_machines = true
min_machines_running = 1

  [[http_service.checks]]
  path = "/"
  interval = "10s"
  timeout = "2s"
  grace_period = "10s"

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
