app = "closepilot-api"
primary_region = "ord"

[build]
dockerfile = "packages/api/Dockerfile"

[env]
NODE_ENV = "production"
LOG_LEVEL = "info"
OTEL_ENABLED = "false"
API_PORT = "3001"

[http_service]
internal_port = 3001
force_https = true
auto_start_machines = true
auto_stop_machines = true
min_machines_running = 1

  [http_service.concurrency]
  type = "requests"
  hard_limit = 200
  soft_limit = 150

  [[http_service.checks]]
  path = "/api/health"
  interval = "10s"
  timeout = "2s"
  grace_period = "10s"

[[vm]]
memory = "512mb"
cpu_kind = "shared"
cpus = 1
